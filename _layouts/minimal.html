<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{% if page.title %}{{ page.title }} | {% endif %}Aldjia Dev</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <meta name="author" content="Aldjia Boughias" />
  <meta name="robots" content="index,follow">

  <!-- Favicons -->
  <link rel="icon" type="image/png"
        href="{{ '/assets/images/favicon.png' | relative_url }}?v={{ site.time | date: '%s' }}" />
  <link rel="apple-touch-icon"
        href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}?v={{ site.time | date: '%s' }}" />

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: site.title }} | Aldjia Dev" />
  <meta property="og:description" content="{{ page.description | default: site.description | strip_html | escape }}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:image" content="{{ page.image | default: site.default_image | absolute_url }}" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ page.title | default: site.title }} | Aldjia Dev" />
  <meta name="twitter:description" content="{{ page.description | default: site.description | strip_html | escape }}" />
  <meta name="twitter:image" content="{{ page.image | default: site.default_image | absolute_url }}" />

  {% seo %}

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Google Fonts (Cormorant Garant + Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}" />

  {% if jekyll.environment == "production" %}
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HJ5JJ91PQX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HJ5JJ91PQX');
  </script>
  {% endif %}
</head>

<body>
  {{ content }}

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
