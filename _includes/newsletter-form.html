<aside class="newsletter-block" id="newsletter">
  <div class="newsletter-block__inner">
    <p class="newsletter-block__label">Restez informé</p>
    <h3 class="newsletter-block__title">Recevoir les prochains articles</h3>
    <p class="newsletter-block__sub">Art &amp; culture numérique, SEO pour artistes,
    retours de projets — une fois par mois, pas de spam.</p>
    <form
      class="newsletter-form"
      action="BREVO_FORM_ACTION_URL"
      method="post"
      target="_blank"
      novalidate>
      <div class="newsletter-form__row">
        <input
          type="email"
          name="EMAIL"
          placeholder="votre@email.com"
          required
          aria-label="Votre adresse email">
        <button type="submit">S'abonner →</button>
      </div>
      <p class="newsletter-form__note">
        Pas de spam. Désabonnement en un clic.
      </p>
    </form>
  </div>
</aside>
