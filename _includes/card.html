<div class="blog-article-card">
  {% if include.image %}
    <img src="{{ include.image }}" alt="{{ include.alt | default: include.title }}" width="800" height="180" loading="lazy" style="width: 100%; height: 180px; object-fit: cover; display: block;">
  {% endif %}
  <div style="padding: 1.5rem; display: flex; flex-direction: column; flex: 1;">
    <h4 style="font-family: 'Cormorant Garant', serif; font-style: italic; font-size: 1.15rem; font-weight: 600; color: var(--ink); margin-bottom: .6rem; line-height: 1.3;">
      {{ include.title }}
    </h4>
    <p style="font-size: .88rem; color: var(--muted); line-height: 1.65; flex: 1; margin-bottom: 1rem;">
      {{ include.description }}
    </p>
    <a href="{{ include.url }}" class="btn btn-outline-primary" style="align-self: flex-start; font-size: .82rem;">
      {{ include.cta | default: "Découvrir" }}
    </a>
  </div>
</div>
