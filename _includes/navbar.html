<header class="site-nav navbar navbar-expand-lg" aria-label="Navigation principale">
  <div class="nav-inner w-100">

    <a class="nav-logo" href="{{ '/' | relative_url }}" aria-label="Aldjia Dev — Accueil">
      Aldjia<span class="nav-logo__dot">.</span>dev
    </a>

    <button class="nav-toggle navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navLinks"
            aria-controls="navLinks"
            aria-expanded="false"
            aria-label="Ouvrir le menu de navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <nav class="nav-links collapse navbar-collapse" id="navLinks" aria-label="Liens principaux">
      <a href="{{ '/about' | relative_url }}"
         {% if page.url == '/about/' %}class="active" aria-current="page"{% endif %}>
        À propos
      </a>
      <a href="{{ '/processus' | relative_url }}"
         {% if page.url == '/processus/' %}class="active" aria-current="page"{% endif %}>
        Comment ça se passe
      </a>
      <a href="{{ '/realisations' | relative_url }}"
         {% if page.url contains '/realisations' %}class="active" aria-current="page"{% endif %}>
        Portfolio
      </a>
      <a href="{{ '/blog' | relative_url }}"
         {% if page.url contains '/blog' %}class="active" aria-current="page"{% endif %}>
        Articles
      </a>
      <a href="{{ '/' | relative_url }}#audit">Audit</a>
      <a href="{{ '/contact' | relative_url }}"
         {% if page.url contains '/contact' %}class="active" aria-current="page"{% endif %}>
        Contact
      </a>
      <a href="{{ site.cal_url }}"
         class="nav-cta"
         target="_blank"
         rel="noopener"
         aria-label="Prendre rendez-vous (ouvre dans un nouvel onglet)">
        Prendre RDV
      </a>
    </nav>

  </div>
</header>
